name: Next.js 15 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify-and-secure:
    name: verify-and-secure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          NODE_OPTIONS: --openssl-legacy-provider # Required for Next.js 15 [[6]]

      - name: Run ESLint and TypeScript checks
        run: npm run lint # Uses Next.js built-in linting [[4]]

      - name: Run Prettier
        run: npx prettier --write .

      - name: Run tests
        run: npm run test

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Get list of changed files
        id: changes_files
        if: env.has_changes == 'true' # Conditional execution [[7]]
        run: |
          files=$(git diff --name-only) # Correct syntax [[5]][[7]]
          echo "::set-output name=files::$files"

      - name: Commit changes using Verified Commit action
        if: env.has_changes == 'true' && github.event_name == 'push'
        uses: swinton/commit@v2.x
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit-message: "fix: auto-format code with Prettier and ESLint"
          ref: refs/heads/develop
          files: ${{ steps.changes_files.outputs.files }} # Corrected ID reference